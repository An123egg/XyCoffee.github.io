    <style>
    /* 提交成功悬浮窗样式 */
    .success-toast {
        position: fixed;
        /* 修改1：top从30px改为50%，垂直基准移到视口中线 */
        top: 50%; 
        left: 50%;
        /* 修改2：默认transform的Y轴从-100px改为-50%（若想保留滑入动画，可仍写-100px） */
        transform: translateX(-50%) translateY(-100%); 
        background-color: rgba(72, 187, 120, 0.95);
        color: #fff;
        padding: 20px 40px;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        font-size: 15px;
        z-index: 9999;
        opacity: 0;
        transition: all 0.6s ease;
        pointer-events: none;
    }
    .success-toast.show {
        opacity: 1;
        /* 修改3：显示状态下Y轴固定为-50%，确保垂直居中 */
        transform: translateX(-50%) translateY(-100%); 
    }
    /* 按钮禁用样式优化 */
    .contact-action-btn:disabled {
        background-color: #ccc;
        cursor: not-allowed;
    }

<!-- 新增2：悬浮窗交互脚本 -->
<script>
    // 获取元素
    const contactForm = document.getElementById('contactForm');
    const sendBtn = document.getElementById('sendBtn');
    const successToast = document.getElementById('successToast');

    // 绑定表单提交事件
    contactForm.addEventListener('submit', function(e) {
        // 核心：阻止表单默认POST提交（避免跳转到错误页面）
        e.preventDefault();

        // 禁用按钮，防止重复点击
        sendBtn.disabled = true;
        sendBtn.value = '发送中...';

        // 显示成功悬浮窗
        successToast.classList.add('show');

        // 2.5秒后隐藏悬浮窗、恢复按钮、重置表单
        setTimeout(() => {
            successToast.classList.remove('show');
            sendBtn.disabled = false;
            sendBtn.value = '发送';
            contactForm.reset(); // 清空表单内容
        }, 2500);
    });
</script>
